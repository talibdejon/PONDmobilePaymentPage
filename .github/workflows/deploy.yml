name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:  # Allow manual trigger

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Get short SHA
        id: sha
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.POND_PAYMENT_SERVER_HOST }}
          username: ${{ secrets.POND_PAYMENT_SERVER_USER }}
          key: ${{ secrets.POND_PAYMENT_SERVER_SSH_KEY }}
          port: ${{ secrets.POND_PAYMENT_SERVER_PORT || 22 }}
          script_stop: true
          script: |
            # Set variables
            REPO_DIR="${{ secrets.POND_PAYMENT_DEPLOY_PATH }}"
            IMAGE_NAME="pondmobile-payment"
            CONTAINER_NAME="pondmobile-payment"
            VERSION="${{ steps.sha.outputs.short_sha }}"

            echo "🚀 Deploying version: $VERSION"

            # Clone or update repository
            if [ -d "$REPO_DIR/.git" ]; then
              echo "📦 Pulling latest changes..."
              cd "$REPO_DIR"
              git fetch --all
              git reset --hard origin/main
              git clean -fd
            else
              echo "📦 Cloning repository..."
              rm -rf "$REPO_DIR"
              git clone --depth 1 --branch main ${{ secrets.POND_PAYMENT_REPO_URL }} "$REPO_DIR"
              cd "$REPO_DIR"
            fi

            # Build new image with version
            echo "🔨 Building Docker image..."
            docker build \
              -f deploy/Dockerfile \
              --build-arg BUILD_VERSION=$VERSION \
              -t $IMAGE_NAME:$VERSION \
              -t $IMAGE_NAME:latest \
              .

            # Stop and remove old container
            echo "🛑 Stopping old container..."
            docker stop $CONTAINER_NAME 2>/dev/null || true
            docker rm $CONTAINER_NAME 2>/dev/null || true

            # Remove old image (keep last 2 versions for rollback)
            echo "🧹 Cleaning old images..."
            docker images --format '{{.Repository}}:{{.Tag}}' | grep $IMAGE_NAME | tail -n +3 | xargs -r docker rmi -f

            # Run new container
            echo "🚀 Starting new container..."
            docker run -d \
              --name $CONTAINER_NAME \
              --restart unless-stopped \
              -p 5001:5001 \
              -v pondmobile-logs:/app/logs \
              --env-file deploy/.env \
              $IMAGE_NAME:$VERSION

            # Wait for health check
            echo "⏳ Waiting for health check..."
            sleep 10

            # Verify deployment
            HEALTH=$(curl -s http://localhost:5001/health || echo "failed")
            echo "🏥 Health check: $HEALTH"

            if echo "$HEALTH" | grep -q "healthy \[$VERSION\]"; then
              echo "✅ Deployment successful! Version: $VERSION"
            else
              echo "❌ Health check failed!"
              docker logs $CONTAINER_NAME --tail 50
              exit 1
            fi

            # Show running containers
            echo "📊 Running containers:"
            docker ps --filter "name=$CONTAINER_NAME" --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"
