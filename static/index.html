<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>POND mobile Secure Payment Gateway</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg-left: #c68157;
      --bg-right: #6b87b7;
      --card-bg: #f3f3f3;
      --text: #4a4a4a;
      --placeholder: #8a8a8a;
      --button: #173cff;
      --button-hover: #1232d7;
      --white: #ffffff;
      --shadow-card: 0 10px 28px rgba(0, 0, 0, 0.12);
      --shadow-input: 0 7px 18px rgba(0, 0, 0, 0.06);
      --radius-card: 28px;
      --radius-input: 30px;
      --radius-button: 999px;
      --error: #b00020;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: Arial, Helvetica, sans-serif;
      color: var(--text);
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--bg-left) 0%, var(--bg-right) 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 18px;
    }

    .page {
      width: 100%;
      max-width: 790px;
    }

    .card {
      background: var(--card-bg);
      border-radius: var(--radius-card);
      box-shadow: var(--shadow-card);
      padding: 34px 42px 46px;
    }

    .brand {
      display: flex;
      justify-content: flex-start;
      align-items: center;
      margin-bottom: 22px;
    }

    .brand img {
      width: 255px;
      max-width: 100%;
      height: auto;
      display: block;
    }

    .title {
      margin: 0 0 30px;
      text-align: center;
      font-size: 42px;
      line-height: 1.14;
      font-weight: 700;
      letter-spacing: -0.02em;
      color: #4a4a4a;
    }

    .field {
      margin-bottom: 18px;
    }

    .field input {
      width: 100%;
      height: 76px;
      border: none;
      outline: none;
      background: var(--white);
      border-radius: var(--radius-input);
      box-shadow: var(--shadow-input);
      padding: 0 24px;
      font-size: 22px;
      font-weight: 600;
      color: #4f4f4f;
    }

    .field input::placeholder {
      color: var(--placeholder);
      font-weight: 600;
    }

    .field input:focus {
      box-shadow:
        0 0 0 4px rgba(23, 60, 255, 0.10),
        var(--shadow-input);
    }

    .actions {
      text-align: center;
      margin-top: 28px;
      margin-bottom: 30px;
    }

    .submit-btn {
      border: none;
      outline: none;
      border-radius: var(--radius-button);
      background: var(--button);
      color: #ffffff;
      min-width: 250px;
      padding: 16px 40px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
    }

    .submit-btn:hover {
      background: var(--button-hover);
    }

    .submit-btn:disabled {
      opacity: 0.75;
      cursor: wait;
    }

    .error {
      min-height: 22px;
      text-align: center;
      color: var(--error);
      font-size: 16px;
      font-weight: 600;
      margin-top: -8px;
      margin-bottom: 10px;
    }

    .note {
      max-width: 590px;
      margin: 0 auto;
      text-align: center;
      font-size: 18px;
      line-height: 1.5;
      font-weight: 700;
      color: #4b4b4b;
    }

    @media (max-width: 820px) {
      .card {
        padding: 28px 24px 34px;
      }

      .brand {
        justify-content: center;
      }

      .brand img {
        width: 215px;
      }

      .title {
        font-size: 34px;
      }

      .field input {
        height: 68px;
        font-size: 20px;
        padding: 0 20px;
      }

      .submit-btn {
        min-width: 220px;
        font-size: 18px;
        padding: 15px 34px;
      }

      .note {
        font-size: 16px;
      }
    }

    @media (max-width: 560px) {
      body {
        padding: 14px;
      }

      .card {
        border-radius: 22px;
        padding: 22px 16px 24px;
      }

      .brand img {
        width: 190px;
      }

      .title {
        font-size: 28px;
        margin-bottom: 22px;
      }

      .field {
        margin-bottom: 14px;
      }

      .field input {
        height: 60px;
        border-radius: 24px;
        font-size: 18px;
        padding: 0 18px;
      }

      .actions {
        margin-top: 20px;
        margin-bottom: 22px;
      }

      .submit-btn {
        width: 100%;
        min-width: 0;
      }

      .note {
        font-size: 15px;
        line-height: 1.5;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="brand">
        <img src="/static/pond-mobile-logo.png" alt="POND mobile logo">
      </div>

      <h1 class="title">Welcome to POND mobile’s Secure Payment Gateway</h1>

      <form id="paymentForm">
        <div class="field">
          <input
            type="text"
            name="reference"
            placeholder="Invoice number or mobile number"
            autocomplete="off"
            required
          >
        </div>

        <div class="field">
          <input
            type="number"
            name="amount"
            placeholder="Amount"
            step="0.01"
            min="0.01"
            required
          >
        </div>

        <div class="field">
          <input
            type="email"
            name="email"
            placeholder="Email address"
            autocomplete="email"
            required
          >
        </div>

        <div class="actions">
          <button id="continueBtn" class="submit-btn" type="submit">Continue</button>
        </div>

        <div class="error" id="errorBox"></div>
      </form>

      <div class="note">
        Use this secure portal to make your payment. Just enter the invoice number or a mobile number above, along with the payment amount. For accounts with multiple mobile numbers, you only need to provide one number associated with the account.
      </div>
    </div>
  </div>

  <script>
    const paymentForm = document.getElementById("paymentForm");
    const continueBtn = document.getElementById("continueBtn");
    const errorBox = document.getElementById("errorBox");

    paymentForm.addEventListener("submit", async (event) => {
      event.preventDefault();
      errorBox.textContent = "";
      continueBtn.disabled = true;

      const formData = new FormData(paymentForm);
      const payload = {
        reference: String(formData.get("reference") || "").trim(),
        amount: String(formData.get("amount") || "").trim(),
        email: String(formData.get("email") || "").trim()
      };

      try {
        const response = await fetch("/create-payment", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "Failed to create payment");
        }

        const redirectForm = document.createElement("form");
        redirectForm.method = "POST";
        redirectForm.action = data.url;

        const tokenInput = document.createElement("input");
        tokenInput.type = "hidden";
        tokenInput.name = "token";
        tokenInput.value = data.token;

        redirectForm.appendChild(tokenInput);
        document.body.appendChild(redirectForm);
        redirectForm.submit();
      } catch (error) {
        errorBox.textContent = error.message || "Unexpected error";
        continueBtn.disabled = false;
      }
    });
  </script>
</body>
</html>
